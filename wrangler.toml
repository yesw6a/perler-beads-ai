# Cloudflare Pages 配置
# 用于本地开发和部署配置

name = "perler-beads-ai"
compatibility_date = "2024-01-01"

# 本地开发配置
[dev]
port = 3000

# 构建配置
[build]
command = "npm run build"

# 环境变量（示例，实际配置在 Cloudflare Dashboard）
# [vars]
# MODEL_NAME = "wanx-v1"

# 部署包含/排除
[[pages_build_output_dir]]
path = ".next"

# 排除文件
[build.exclude]
files = [
  "node_modules",
  ".git",
  ".github",
  "*.md",
  ".env*",
  "docs",
  "scripts"
]
