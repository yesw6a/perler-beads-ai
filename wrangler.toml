# Cloudflare Wrangler 配置

name = "perler-beads-ai"
compatibility_date = "2024-01-01"

# Pages 项目配置
[site]
  bucket = "."
  include = [
    "*.html",
    "*.css",
    "*.js",
    "*.svg",
    "*.png",
    "*.jpg",
    "*.jpeg",
    "*.gif",
    "*.ico",
    "*.json",
    "*.webp",
    "_headers",
    "_redirects"
  ]
  exclude = [
    ".git/**",
    ".vscode/**",
    ".github/**",
    "node_modules/**",
    "*.md",
    ".gitignore",
    "docs/**",
    "scripts/**",
    "*.py",
    "*.jpg"
  ]

# 环境变量
[vars]
  APP_NAME = "perler-beads-ai"
  APP_VERSION = "0.1.0"

# 开发服务器配置
[dev]
  port = 3000
  local_protocol = "http"
